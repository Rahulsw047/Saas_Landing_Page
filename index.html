<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern SAAS Landing Page</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <div class="logo">
                <a href="#">SAAS <span class="logo-accent">Flow</span></a>
            </div>

            <ul class="nav-links">
                <li><a href="#features">Features</a></li>
                <li><a href="#pricing">Pricing</a></li>
                <li><a href="#testimonials">Testimonials</a></li>
            </ul>

            <div class="nav-cta">
                <a href="#" class="btn-primary">Get Started</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-content">
                    <span class="badge">Version 2.O Launched</span>
                    <h1 class="hero-title">Scale Your SAAS Product <span class="text-gradient">Instently</span></h1>
                    <p class="hero-subtitle">
                        Automate Your Workflows, track real time analytics,and grow your business with our all-in-one developer-first platform.
                    </p>
                    <div class="hero-btns">
                        <a href="#" class="btn-primary">Start Free Trial</a>
                        <a href="#" class="btn-secondary">Watch Demo</a>
                    </div>
                </div>
                <div class="hero-visuals">
                    <div class="mockup-screen">
                        <div class="mockup-header">
                            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                        </div>
                        <div class="mockup-body">
                            <div class="mockup-line short"></div>
                            <div class="mockup-grid">
                                <div class="mockup-chart"></div>
                                <div class="mockup-chart"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer></footer>
</body>
</html>
